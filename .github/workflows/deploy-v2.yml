name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Setup Node.js ⚙️
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Node Dependencies 📦
        run: npm install

      - name: Run Scraper 🔍
        run: node scraper.cjs
        continue-on-error: true

      - name: Build 🔧
        run: npm run build

      - name: Deploy to GitHub Pages (Legacy Push) 🪂
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist
          branch: gh-pages
          clean: true
